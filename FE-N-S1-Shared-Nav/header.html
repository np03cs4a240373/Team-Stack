<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaamKhoji</title>

    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Page-specific stylesheet goes here (e.g. landing.css, jobs.css) -->
    <!-- <link rel="stylesheet" href="../css/main.css"> -->

    <!-- BASE_URL for AJAX calls — set by backend to the root path of the app -->
    <script>const BASE_URL = '';</script>

    <style>
        /* ---- Logo ---- */
        .nav-logo {
            overflow: hidden;
            height: 64px;
            display: inline-flex;
            align-items: center;
        }
        .logo-brand-img {
            height: 165px;
            width: auto;
            display: block;
            object-fit: contain;
            margin: -50px 0;
            pointer-events: none;
        }

        /* ---- Sign Up button ---- */
        .nav-links a.btn-signup {
            background: #ffffff;
            color: #00b4d8;
            border: 1.5px solid #00b4d8;
            font-weight: 700;
            transition: background 0.22s ease, color 0.22s ease, box-shadow 0.22s ease;
        }
        .nav-links a.btn-signup:hover,
        .nav-links a.btn-signup:focus {
            background: #e0f7fa;
            color: #0096b3;
            box-shadow: 0 4px 16px rgba(0, 180, 216, 0.18);
        }

        /* ---- Avatar & Dropdown ---- */
        .nav-avatar-wrap { position: relative; display: flex; align-items: center; }
        .nav-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: #00b4d8; color: #fff; border: none; cursor: pointer;
            font-size: 0.9rem; font-weight: 700; display: flex; align-items: center;
            justify-content: center; transition: box-shadow 0.25s ease, transform 0.25s ease;
            font-family: "Satoshi", "Poppins", sans-serif;
        }
        .nav-avatar:hover { box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.35); transform: scale(1.05); }
        .nav-dropdown {
            position: absolute; top: calc(100% + 10px); right: 0;
            background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 14px;
            min-width: 200px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); z-index: 2000;
            opacity: 0; visibility: hidden; pointer-events: none; transform: translateY(-8px);
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
        }
        .nav-dropdown.open { opacity: 1; visibility: visible; pointer-events: auto; transform: translateY(0); }
        .nav-dropdown-header {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 1rem 1rem 0.75rem; border-bottom: 1px solid rgba(0,0,0,0.07);
        }
        .dropdown-avatar-lg {
            width: 40px; height: 40px; border-radius: 50%;
            background: #00b4d8; color: #fff; display: flex; align-items: center;
            justify-content: center; font-size: 1rem; font-weight: 700; flex-shrink: 0;
        }
        .dropdown-name { font-weight: 700; font-size: 0.88rem; color: #1e293b; }
        .dropdown-role { font-size: 0.75rem; color: #64748b; text-transform: capitalize; margin-top: 1px; }
        .nav-dropdown .dropdown-item {
            display: block; width: 100%; padding: 0.65rem 1rem;
            font-size: 0.85rem; color: #1e293b; font-weight: 500;
            text-decoration: none; transition: background 0.2s; box-sizing: border-box;
        }
        .nav-dropdown .dropdown-item:hover { background: rgba(0,180,216,0.08); color: #00b4d8; }
        .nav-dropdown .dropdown-logout {
            color: #c43c3c; border-top: 1px solid rgba(0,0,0,0.07);
            margin-top: 0.25rem; border-radius: 0 0 14px 14px;
        }
        .nav-dropdown .dropdown-logout:hover { background: rgba(192,60,60,0.08); color: #a02828; }

        /* ---- Star / Save toggle ---- */
        .star-btn { background: none; border: none; cursor: pointer; padding: 4px; line-height: 1; display: flex; align-items: center; transition: transform 0.2s ease; }
        .star-btn:hover { transform: scale(1.2); }
        .star-btn svg { width: 20px; height: 20px; }
        .star-btn .star-empty { display: block; }
        .star-btn .star-filled { display: none; color: #f59e0b; }
        .star-btn.starred .star-empty { display: none; }
        .star-btn.starred .star-filled { display: block; }

        /* ---- Notification Bell ---- */
        .nav-notif-wrap { position: relative; display: flex; align-items: center; }
        .nav-notif-btn {
            background: none; border: none; cursor: pointer;
            width: 36px; height: 36px; padding: 0;
            display: flex; align-items: center; justify-content: center;
            position: relative; border-radius: 50%;
            transition: background 0.2s ease; color: #64748b; flex-shrink: 0; z-index: 1;
        }
        .nav-notif-btn:hover { background: rgba(0,180,216,0.1); color: #00b4d8; }
        .notif-badge {
            position: absolute; top: 2px; right: 2px;
            background: #ef4444; color: #fff; font-size: 0.6rem; font-weight: 700;
            border-radius: 999px; min-width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
            padding: 0 3px; line-height: 1; pointer-events: none;
        }
        .nav-notif-dropdown {
            position: absolute; top: calc(100% + 8px); right: -8px;
            background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 14px;
            width: 320px; max-width: 90vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12); z-index: 2000;
            opacity: 0; visibility: hidden; pointer-events: none; transform: translateY(-6px);
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s; overflow: hidden;
        }
        .nav-notif-dropdown.open { opacity: 1; visibility: visible; pointer-events: auto; transform: translateY(0); }
        .notif-header { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1rem 0.65rem; border-bottom: 1px solid rgba(0,0,0,0.07); }
        .notif-header-title { font-size: 0.88rem; font-weight: 700; color: #1e293b; }
        .notif-mark-read { font-size: 0.75rem; color: #00b4d8; background: none; border: none; cursor: pointer; padding: 0; font-weight: 600; }
        .notif-mark-read:hover { text-decoration: underline; }
        .notif-list { max-height: 340px; overflow-y: auto; }
        .notif-item { display: block; padding: 0.75rem 1rem; border-bottom: 1px solid rgba(0,0,0,0.05); text-decoration: none; transition: background 0.15s ease; cursor: pointer; }
        .notif-item:last-child { border-bottom: none; }
        .notif-item:hover { background: rgba(0,180,216,0.06); }
        .notif-item.unread { background: rgba(0,180,216,0.06); }
        .notif-item-title { font-size: 0.82rem; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.2rem; }
        .notif-dot { width: 7px; height: 7px; border-radius: 50%; background: #00b4d8; flex-shrink: 0; }
        .notif-item-msg { font-size: 0.78rem; color: #64748b; line-height: 1.45; }
        .notif-item-time { font-size: 0.7rem; color: #94a3b8; margin-top: 0.25rem; }
        .notif-empty { padding: 1.5rem 1rem; text-align: center; color: #94a3b8; font-size: 0.82rem; }

        @media (max-width: 640px) {
            .nav-avatar-wrap { width: 100%; flex-direction: column; align-items: stretch; }
            .nav-avatar { width: 100%; border-radius: 8px; height: auto; padding: 0.65rem 1rem; font-size: 0.9rem; justify-content: flex-start; gap: 0.6rem; background: var(--primary-light, rgba(0,180,216,0.1)); color: #0096b3; }
            .nav-avatar::before { content: "Profile & Account"; font-size: 0.9rem; }
            .avatar-initials { display: none; }
            .nav-dropdown { position: static; opacity: 1; visibility: visible; transform: none; box-shadow: none; border: 1px solid rgba(0,0,0,0.06); border-radius: 8px; margin-top: 0.25rem; display: none; min-width: unset; }
            .nav-dropdown.open { display: block; }
            .nav-dropdown-header { display: none; }
            .nav-notif-dropdown { position: fixed; top: 64px; right: 8px; left: 8px; width: auto; max-width: none; }
        }
    </style>
</head>
