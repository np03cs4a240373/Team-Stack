<!-- Page Header -->
<div class="page-header">
    <div class="container">

        <h1>Company Profile</h1>

        <p>Help job seekers learn about your company</p>

    </div>
</div>

<div class="container section">
    <div style="max-width:680px; margin:0 auto;">

        <!-- Success Message -->
        <div class="flash flash-success" style="border-radius:8px; margin-bottom:1.5rem;">
            Profile updated successfully!
        </div>

        <!-- Error Message -->
        <div class="flash flash-error" style="border-radius:8px; margin-bottom:1.5rem;">
            Invalid form submission.
        </div>

        <!-- Company Statistics -->
        <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:1rem; margin-bottom:1.5rem;">

            <div class="card" style="padding:1.1rem 1.2rem; text-align:center;">
                <div style="font-size:1.6rem; font-weight:800; color:var(--primary);">
                    5
                </div>
                <div style="font-size:0.78rem; color:var(--text-muted); margin-top:0.15rem;">
                    Total Jobs
                </div>
            </div>

            <div class="card" style="padding:1.1rem 1.2rem; text-align:center;">
                <div style="font-size:1.6rem; font-weight:800; color:var(--primary);">
                    20
                </div>
                <div style="font-size:0.78rem; color:var(--text-muted); margin-top:0.15rem;">
                    Total Applicants
                </div>
            </div>

            <div class="card" style="padding:1.1rem 1.2rem; text-align:center;">
                <div style="font-size:1.6rem; font-weight:800; color:#10b981;">
                    3
                </div>
                <div style="font-size:0.78rem; color:var(--text-muted); margin-top:0.15rem;">
                    Accepted
                </div>
            </div>

            <div class="card" style="padding:1.1rem 1.2rem; text-align:center;">
                <div style="font-size:1.6rem; font-weight:800; color:#f59e0b;">
                    7
                </div>
                <div style="font-size:0.78rem; color:var(--text-muted); margin-top:0.15rem;">
                    Pending Review
                </div>
            </div>

        </div>

        <!-- Company Preview Card -->
        <div class="card mb-3" style="display:flex; align-items:center; gap:1.25rem;">

            <!-- Company Logo -->
            <img src="company-logo.png"
                 alt="Company Logo"
                 style="width:64px;height:64px;border-radius:10px;object-fit:contain;border:1px solid var(--border);background:#f8fafc;">

            <div>

                <div style="font-weight:700; font-size:1rem;">
                    ABC Company
                </div>

                <div class="text-muted text-sm">
                    Information Technology · Kathmandu
                </div>

                <a href="#"
                   target="_blank"
                   rel="noopener"
                   class="text-sm"
                   style="color:var(--primary);">

                    https://abccompany.com

                </a>

            </div>

        </div>

        <!-- Company Profile Form -->
        <div class="card">

            <form method="POST" action="#" enctype="multipart/form-data">

                <!-- Account Information -->
                <div class="form-group">

                    <div class="grid-2">

                        <div class="form-group">
                            <label class="form-label" for="name">Name</label>
                            <input type="text"
                                   id="name"
                                   name="name"
                                   class="form-control"
                                   value="John Employer"
                                   required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="phone">Phone</label>
                            <input type="text"
                                   id="phone"
                                   name="phone"
                                   class="form-control"
                                   value="9800000000"
                                   placeholder="10 digits">
                        </div>

                    </div>

                    <div class="form-group">
                        <label class="form-label" for="user_location">Location</label>
                        <input type="text"
                               id="user_location"
                               name="user_location"
                               class="form-control"
                               value="Kathmandu">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="bio">Bio</label>
                        <input type="text"
                               id="bio"
                               name="bio"
                               class="form-control"
                               value="Employer account">
                    </div>

                    <div class="grid-2">

                        <div class="form-group">
                            <label class="form-label" for="password">
                                New Password
                                <span style="color:var(--text-muted); font-weight:400;">(optional)</span>
                            </label>
                            <input type="password"
                                   id="password"
                                   name="password"
                                   class="form-control"
                                   autocomplete="new-password">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="confirm_password">
                                Confirm Password
                            </label>
                            <input type="password"
                                   id="confirm_password"
                                   name="confirm_password"
                                   class="form-control"
                                   autocomplete="new-password">
                        </div>

                    </div>

                </div>

                <!-- Logo Upload -->
                <div class="form-group">
                    <label class="form-label" for="logo">
                        Company Logo
                        <span style="color:var(--text-muted); font-weight:400;">(optional)</span>
                    </label>

                    <input type="file"
                           id="logo"
                           name="logo"
                           accept="image/jpeg,image/png,image/gif,image/webp"
                           class="form-control"
                           style="padding:0.45rem 1rem;">

                    <small class="text-muted">
                        JPG, PNG, GIF or WebP · Max 2 MB
                    </small>
                </div>

                <div class="grid-2">

                    <div class="form-group">
                        <label class="form-label" for="industry">Industry</label>
                        <input type="text"
                               id="industry"
                               name="industry"
                               class="form-control"
                               placeholder="e.g. Information Technology"
                               value="Information Technology">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="location">Location</label>
                        <input type="text"
                               id="location"
                               name="location"
                               class="form-control"
                               placeholder="e.g. Kathmandu, Nepal"
                               value="Kathmandu, Nepal">
                    </div>

                </div>

                <div class="form-group">
                    <label class="form-label" for="website">Website</label>
                    <input type="url"
                           id="website"
                           name="website"
                           class="form-control"
                           placeholder="https://yourcompany.com"
                           value="https://abccompany.com">
                </div>

                <!-- Company Description -->
                <div class="form-group">
                    <label class="form-label" for="description">
                        Company Description *
                    </label>

                    <textarea id="description"
                              name="description"
                              class="form-control"
                              rows="5"
                              placeholder="Tell job seekers about your company, culture, mission, and what it's like to work there..."
                              required>We are a growing IT company.</textarea>
                </div>

                <button type="submit" class="btn btn-primary">
                    Save Profile
                </button>

            </form>

        </div>

    </div>
</div>
