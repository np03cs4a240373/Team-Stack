<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - KaamKhoji</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <a href="../index.html">
                <img src="../assets/KaamKhoji.png" alt="KaamKhoji" style="height:80px;width:auto;display:block;margin:-20px auto;">
            </a>
        </div>

        <h1 class="auth-title">Forgot Password</h1>
        <p class="auth-subtitle">Enter your email to get a password reset link</p>

        <form method="POST" action="/api/forgot-password">

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email"
                       class="form-control"
                       placeholder="Enter your registered email"
                       value=""
                       required>
                <span class="form-error">Please enter a valid email address.</span>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Get Reset Link
            </button>
        </form>

        <div class="auth-switch" style="margin-top:1.25rem;">
            <a href="login.html">← Back to Login</a>
        </div>

    </div>
</div>

<script src="../FE-N-Shared-Utils/utils.js"></script>
<script src="../FE-N-Shared-Utils/form-validation.js"></script>
</body>
</html>
