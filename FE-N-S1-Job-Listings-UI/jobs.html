<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Jobs - KaamKhoji</title>

    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="jobs.css">

    <!-- BASE_URL for AJAX calls — defined here so JS files can reference it -->
    <script>const BASE_URL = '';</script>
</head>
<body>

<!-- ====== NAVIGATION BAR ====== -->
<!-- See FE-N-S1-Shared-Nav/header.html for the shared nav component -->
<nav class="navbar">
    <div class="nav-container">
        <a href="/index.html" class="nav-logo" aria-label="KaamKhoji Home">
            <img src="/assets/kaamkhoji.png" alt="KaamKhoji" class="logo-brand-img">
        </a>
        <ul class="nav-links" id="navLinks">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/pages/jobs.html">Find Jobs</a></li>
            <li><a href="/login.html" class="btn btn-outline btn-sm">Login</a></li>
            <li><a href="/signup.html" class="btn btn-sm btn-signup">Sign Up</a></li>
        </ul>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>

<main class="main-content">

<!-- Page Header -->
<div class="page-header">
    <div class="container">
        <h1>Browse Jobs</h1>
        <p>Find your perfect opportunity — search and filter below</p>
    </div>
</div>

<div class="container section">

    <!-- SEARCH & FILTER BAR -->
    <!-- This form triggers AJAX search (see jobs.js) -->
    <form id="jobSearchForm" class="search-bar">

        <!-- Keyword Search -->
        <div class="search-input-wrap" style="flex:2;">
            <input type="text"
                   id="searchKeyword"
                   name="keyword"
                   placeholder="Job title, skill, or company..."
                   value=""
                   style="padding-left:1rem;">
        </div>

        <!-- Location Filter -->
        <div class="search-input-wrap">
            <input type="text"
                   id="searchLocation"
                   name="location"
                   placeholder="Location..."
                   value=""
                   style="padding-left:1rem;">
        </div>

        <!-- Salary Range Filter -->
        <div class="search-input-wrap" style="max-width:140px;">
            <input type="number"
                   id="searchSalaryMin"
                   name="salary_min"
                   placeholder="Min salary"
                   value=""
                   min="0"
                   step="1000"
                   style="padding-left:1rem;">
        </div>
        <div class="search-input-wrap" style="max-width:140px;">
            <input type="number"
                   id="searchSalaryMax"
                   name="salary_max"
                   placeholder="Max salary"
                   value=""
                   min="0"
                   step="1000"
                   style="padding-left:1rem;">
        </div>

        <!-- Job Type Filter -->
        <select id="searchType" name="type" class="form-control" style="max-width:150px;">
            <option value="">All Types</option>
            <option value="full-time">Full Time</option>
            <option value="part-time">Part Time</option>
            <option value="remote">Remote</option>
            <option value="contract">Contract</option>
            <option value="internship">Internship</option>
        </select>

        <!-- Experience Level Filter -->
        <select id="searchExperience" name="experience" class="form-control" style="max-width:150px;">
            <option value="">All Levels</option>
            <option value="entry">Entry Level</option>
            <option value="mid">Mid Level</option>
            <option value="senior">Senior Level</option>
        </select>

        <button type="submit" class="btn btn-primary">Search</button>
    </form>

    <!-- LOADING SPINNER (shown while AJAX is running) -->
    <div id="searchLoading" class="hidden">
        <div class="spinner"></div>
        <p class="loading-text">Searching jobs...</p>
    </div>

    <!-- JOB RESULTS CONTAINER -->
    <!-- JavaScript (jobs.js) fills this div with rendered job cards via AJAX -->
    <div id="jobResults" class="grid-3" style="transition: opacity 0.3s ease; min-height: 200px;">
        <div class="spinner"></div>
    </div>

</div>

</main>

<!-- ====== FOOTER ====== -->
<footer class="footer">
    <div class="footer-bottom" style="border-top:none; padding:1.5rem;">
        <p>&copy; 2026 KaamKhoji — Made for Nepal</p>
    </div>
</footer>

<script src="../FE-N-Shared-Utils/utils.js"></script>
<script src="../FE-N-Shared-Utils/nav.js"></script>
<script src="../FE-N-Shared-Utils/flash.js"></script>
<script src="jobs.js"></script>
</body>
</html>
